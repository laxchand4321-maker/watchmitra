<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchMitra Universal Production v17.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --primary: #00ff66; --accent: #bd00ff; --dark: #030712; --card-bg: rgba(15, 23, 42, 0.8); }
        body { background: var(--dark); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; margin: 15px; border: 1px solid #334155; }
        .btn { background: var(--primary); color: #000; padding: 15px; border-radius: 12px; border: none; width: 100%; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; }
    </style>
</head>
<body>
    <header class="header">
        <div>Watch<b>Mitra</b></div>
        <div><i class="fa-solid fa-coins"></i> 0 Coins</div>
    </header>

    <div class="card">
        <h3>🎡 लकी स्पिन और डेली टास्क</h3>
        <button class="btn" onclick="alert('Spinning...')">स्पिन व्हील</button>
        <button class="btn" style="background:var(--accent); color:#fff;" onclick="alert('Tasks Open')">टास्क देखें</button>
    </div>

    <div class="card">
        <h3>📺 वीडियो रिवॉर्ड</h3>
        <button class="btn" onclick="alert('Video Starting...')">वीडियो देखें और कमाएं</button>
    </div>

    <nav class="nav-bar">
        <button onclick="alert('Home')"><i class="fa-solid fa-house"></i></button>
        <button onclick="alert('Wallet')"><i class="fa-solid fa-wallet"></i></button>
        <button onclick="alert('Profile')"><i class="fa-solid fa-user"></i></button>
    </nav>

    <script>
        console.log("WatchMitra Master System Live");
        // यहाँ से सारे फंक्शन्स रन होंगे
    </script>
</body>
</html>
